  <defs
     id="defs1">
    <style
       id="style1">
      /* ============================================================
         No external @import ‚ÄĒ GitHub strips/blocks remote @import
         fonts inside embedded SVGs, which is what caused the header
         to fall back to a non-monospace font (and misalign) after
         download. Every font-family below is a *generic monospace
         stack only* ‚ÄĒ Consolas / Menlo / Cascadia / Liberation Mono /
         the browser's built-in `monospace`. Whichever one resolves,
         it is still fixed-width, so column alignment can never break.
         ============================================================ */

      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, 'Cascadia Code', monospace; }

      /* Palette pulled directly from the portfolio (godson.blog):
         cream text-on-dark, muted olive-grey secondary, near-black.
         The ONLY new color introduced here is the panel background,
         which is GitHub's own elevated dark surface (#161b22) ‚ÄĒ
         one shade up from GitHub's page background (#0d1117) ‚ÄĒ so it
         reads as &quot;a terminal sitting on top of GitHub&quot;, not a floating
         transparent block. */
      .bg-panel   { fill: #161b22; }
      .bg-titlebar{ fill: #12161d; }
      .border     { stroke: #30363d; stroke-width: 1; fill: none; }
      .divider    { stroke: #30363d; stroke-width: 1; }

      .cream        { fill: #D9D2C0; }               /* portfolio primary text */
      .cream-bright { fill: #EDE7D9; }                /* portfolio near-white / headline */
      .muted        { fill: #99937f; }                /* portfolio secondary/caption grey */
      .dim          { fill: #5c5a4f; }                /* portfolio faint accents */

      .ascii   { font-size: 17px; font-weight: 700; letter-spacing: 0; }
      .prompt-user { font-size: 14px; font-weight: 700; }
      .prompt-sep  { font-size: 14px; font-weight: 500; }
      .cmd     { font-size: 13.5px; font-weight: 500; }

      .name    { font-size: 21px; font-weight: 700; }
      .role    { font-size: 14.5px; font-weight: 500; }
      .bio     { font-size: 13.5px; font-weight: 400; }

      .section-title { font-size: 12px; font-weight: 700; letter-spacing: 3px; }
      .label   { font-size: 13.5px; font-weight: 500; }
      .value   { font-size: 13.5px; font-weight: 500; }
      .bullet  { font-size: 13.5px; font-weight: 500; }
    </style>
  </defs>
